version: '3.8'

services:
  # دیتابیس اصلی پروژه (پستگرس ۱۸ پایدار)
  postgres_db:
    image: postgres:18-alpine
    container_name: teknovia_postgres
    environment:
      POSTGRES_DB: ${PG_DB_NAME:-teknovia_db}
      POSTGRES_USER: ${PG_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD:-postgres_pass}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - teknovia_network

  # سرویس کش و صف‌های سلری
  redis_cache:
    image: redis:7-alpine
    container_name: teknovia_redis
    ports:
      - "6379:6379"
    networks:
      - teknovia_network

  # سرویس برداری دیتابیس TurboVec (منطبق با نام فیزیکی پوشه با حروف بزرگ)
  vector_fastapi:
    build:
      context: "./AI-Agency(FastAPI)"
    container_name: teknovia_vector
    ports:
      - "8000:8000"
    volumes:
      - ./AI-Agency(FastAPI)/vector_storage:/app/vector_storage
    networks:
      - teknovia_network

  # وب‌سرویس اصلی جنگو (تزریق استاندارد متغیرهای دیتابیس و کش داکر)
  django_backend:
    build:
      context: ./AI-Agency
    container_name: teknovia_django
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./AI-Agency:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
      - PG_DB_NAME=${PG_DB_NAME:-teknovia_db}
      - PG_DB_USER=${PG_DB_USER:-postgres}
      - PG_DB_PASSWORD=${PG_DB_PASSWORD:-postgres_pass}
    depends_on:
      - postgres_db
      - redis_cache
      - vector_fastapi
    networks:
      - teknovia_network

  # ورکر پردازش تسک‌های پس‌زمینه سلری
  celery_worker:
    build:
      context: ./AI-Agency
    container_name: teknovia_celery
    command: celery -A core worker --loglevel=info
    volumes:
      - ./AI-Agency:/app
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
      - PG_DB_NAME=${PG_DB_NAME:-teknovia_db}
      - PG_DB_USER=${PG_DB_USER:-postgres}
      - PG_DB_PASSWORD=${PG_DB_PASSWORD:-postgres_pass}
    depends_on:
      - redis_cache
      - django_backend
    networks:
      - teknovia_network

  # سرویس مانیتورینگ و شنود پیام‌های تلگرام (تلتون) - فعال‌سازی خودکار و ۲۴ ساعته تلتون در بک‌گراند داکر
  telethon_listener:
    build:
      context: ./AI-Agency
    container_name: teknovia_telethon
    command: python manage.py run_telethon
    volumes:
      - ./AI-Agency:/app
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
      - PG_DB_NAME=${PG_DB_NAME:-teknovia_db}
      - PG_DB_USER=${PG_DB_USER:-postgres}
      - PG_DB_PASSWORD=${PG_DB_PASSWORD:-postgres_pass}
      - TELEGRAM_APP_ID=${TELEGRAM_APP_ID}
      - TELEGRAM_APP_HASH=${TELEGRAM_APP_HASH}
      - TELEGRAM_SESSION=${TELEGRAM_SESSION}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
    depends_on:
      - redis_cache
      - django_backend
    networks:
      - teknovia_network

  # فرانت‌اند آسترو ۷ (تزریق آدرس وب‌سرور جنگو و ردیس داکر)
  astro_frontend:
    build:
      context: ./AI-Agency-Astro
    container_name: teknovia_astro
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://django_backend:8001
      - REDIS_URL=redis://redis_cache:6379
    depends_on:
      - django_backend
    networks:
      - teknovia_network

volumes:
  postgres_data:

networks:
  teknovia_network:
    driver: bridge