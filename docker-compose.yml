version: '3.8'

services:
  # دیتابیس اصلی پروژه (پستگرس ۱۸ پایدار)
  postgres_db:
    image: postgres:18-alpine
    container_name: teknovia_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - teknovia_network

  # سرویس کش و صف‌های سلری
  redis_cache:
    image: redis:7-alpine
    container_name: teknovia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - teknovia_network

  # سرویس برداری دیتابیس TurboVec
  vector_fastapi:
    build:
      context: "./AI-Agency(FastAPI)"
    container_name: teknovia_vector
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./AI-Agency(FastAPI)/vector_storage:/app/vector_storage
    networks:
      - teknovia_network

  # وب‌سرویس اصلی جنگو
  django-backend:
    build:
      context: ./AI-Agency
    container_name: teknovia_django
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./AI-Agency:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
    depends_on:
      - postgres_db
      - redis_cache
      - vector_fastapi
    networks:
      - teknovia_network

  # ورکر پردازش تسک‌های پس‌زمینه سلری مجهز به بازیابی خودکار در صورت قطعی شبکه
  celery_worker:
    build:
      context: ./AI-Agency
    container_name: teknovia_celery
    restart: unless-stopped
    command: celery -A core worker --loglevel=info
    volumes:
      - ./AI-Agency:/app
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
    depends_on:
      - redis_cache
      - django-backend
    networks:
      - teknovia_network

  # سرویس مانیتورینگ و شنود پیام‌های تلگرام (تلتون)
  telethon_listener:
    build:
      context: ./AI-Agency
    container_name: teknovia_telethon
    restart: unless-stopped
    command: python manage.py run_telethon
    volumes:
      - ./AI-Agency:/app
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres_db
      - REDIS_URL=redis://redis_cache:6379/0
    depends_on:
      - redis_cache
      - django-backend
    networks:
      - teknovia_network

  # فرانت‌اند آسترو ۷
  astro_frontend:
    build:
      context: ./AI-Agency-Astro
    container_name: teknovia_astro
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://django-backend:8001
      - REDIS_URL=redis://redis_cache:6379
    depends_on:
      - django-backend
    networks:
      - teknovia_network

volumes:
  postgres_data:

networks:
  teknovia_network:
    driver: bridge